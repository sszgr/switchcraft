# Cisco IOS trunk batch configuration template
# Usage:
# 1) interfaces: comma-separated interface list
#    example: GigabitEthernet1/0/1,GigabitEthernet1/0/2
# 2) vlan: allowed VLANs on trunk interface
#    example: all or 10,20,30

name: Cisco-Trunk-Config
device: cisco-ios
description: Batch trunk interface configuration for Cisco IOS switches.

# Default serial parameters (can be overridden in UI)
serial:
  baudRate: 9600
  dataBits: 8
  stopBits: 1
  parity: none
  flowControl: none

fields:
  - key: interfaces
    type: list
    label: Interface List
    required: true
  - key: vlan
    type: string
    label: Permit VLAN
    default: all

script:
  - configure terminal
  - foreach iface in interfaces:
  - '  interface {{iface}}'
  - '  switchport mode trunk'
  - '  switchport trunk allowed vlan {{vlan}}'
  - '  exit'
  - end
